<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .todo-app {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .input-section {
            padding: 25px;
            border-bottom: 2px solid #f0f0f0;
            background: #fafafa;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
        }

        button {
            padding: 12px 24px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        button:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button-delete {
            background-color: #ff6b6b;
            padding: 8px 12px;
            font-size: 13px;
        }

        .button-delete:hover {
            background-color: #ee5a52;
        }

        .button-check {
            background-color: #51cf66;
            padding: 8px 12px;
            font-size: 13px;
        }

        .button-check:hover {
            background-color: #40c057;
        }

        .stats {
            padding: 15px 25px;
            background-color: #f8f9ff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .todo-list {
            padding: 0;
        }

        .todo-item {
            padding: 16px 25px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background-color 0.2s ease;
        }

        .todo-item:hover {
            background-color: #fafafa;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todo-text {
            flex: 1;
            color: #333;
            font-size: 16px;
            word-break: break-word;
        }

        .todo-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            padding: 60px 25px;
            text-align: center;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>My Todos</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="todo-app">
            <div class="input-section">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="todoInput"
                        placeholder="Add a new todo..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="addTodo()">Add</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="totalCount">0</span>
                    <span>Total</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="completedCount">0</span>
                    <span>Completed</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="remainingCount">0</span>
                    <span>Remaining</span>
                </div>
            </div>

            <div id="todoList" class="todo-list">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <p class="empty-text">No todos yet. Add one to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const todos = [];
        let nextId = 1;

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                input.focus();
                return;
            }

            todos.push({
                id: nextId++,
                text: text,
                completed: false
            });

            input.value = '';
            input.focus();
            render();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
            }
            render();
        }

        function deleteTodo(id) {
            const index = todos.findIndex(t => t.id === id);
            if (index > -1) {
                todos.splice(index, 1);
            }
            render();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTodo();
            }
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const remaining = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('remainingCount').textContent = remaining;
        }

        function render() {
            const list = document.getElementById('todoList');
            updateStats();

            if (todos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p class="empty-text">No todos yet. Add one to get started!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input
                        type="checkbox"
                        class="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <div class="todo-actions">
                        <button class="button-delete" onclick="deleteTodo(${todo.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initial render
        render();
    </script>
</body>
</html>
