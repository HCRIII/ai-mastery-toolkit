<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Quarterly Revenue Performance
  </text>

  <!-- Axes -->
  <line x1="80" y1="350" x2="750" y2="350" stroke="#999" stroke-width="2"/>
  <line x1="80" y1="350" x2="80" y2="50" stroke="#999" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="70" y="355" font-size="12" text-anchor="end" fill="#666">$0</text>
  <text x="70" y="305" font-size="12" text-anchor="end" fill="#666">$100K</text>
  <text x="70" y="255" font-size="12" text-anchor="end" fill="#666">$200K</text>
  <text x="70" y="205" font-size="12" text-anchor="end" fill="#666">$300K</text>
  <text x="70" y="155" font-size="12" text-anchor="end" fill="#666">$400K</text>
  <text x="70" y="105" font-size="12" text-anchor="end" fill="#666">$500K</text>

  <!-- Y-axis gridlines -->
  <line x1="80" y1="300" x2="750" y2="300" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="250" x2="750" y2="250" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="200" x2="750" y2="200" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="150" x2="750" y2="150" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="80" y1="100" x2="750" y2="100" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Bars with data -->
  <!-- Q1: $250K -->
  <rect x="140" y="175" width="80" height="175" fill="#667eea" opacity="0.8"/>
  <text x="180" y="370" font-size="12" text-anchor="middle" fill="#333">Q1 2026</text>
  <text x="180" y="165" font-size="14" font-weight="bold" text-anchor="middle" fill="#667eea">$250K</text>

  <!-- Q2: $380K -->
  <rect x="280" y="60" width="80" height="290" fill="#764ba2" opacity="0.8"/>
  <text x="320" y="370" font-size="12" text-anchor="middle" fill="#333">Q2 2026</text>
  <text x="320" y="45" font-size="14" font-weight="bold" text-anchor="middle" fill="#764ba2">$380K</text>

  <!-- Q3: $420K -->
  <rect x="420" y="30" width="80" height="320" fill="#f093fb" opacity="0.8"/>
  <text x="460" y="370" font-size="12" text-anchor="middle" fill="#333">Q3 2026</text>
  <text x="460" y="15" font-size="14" font-weight="bold" text-anchor="middle" fill="#f093fb">$420K</text>

  <!-- Q4: $350K -->
  <rect x="560" y="80" width="80" height="270" fill="#4facfe" opacity="0.8"/>
  <text x="600" y="370" font-size="12" text-anchor="middle" fill="#333">Q4 2026</text>
  <text x="600" y="65" font-size="14" font-weight="bold" text-anchor="middle" fill="#4facfe">$350K</text>

  <!-- Legend -->
  <rect x="50" y="390" width="750" height="1" fill="#e0e0e0"/>
  <text x="60" y="410" font-size="11" fill="#666">Average: $350K | Growth: +40% YoY</text>
</svg>
